project_name: dossier
version: 2

before:
  hooks:
    - go mod tidy
    - go test -v ./...

builds:
  -
    id: dossier
    main: ./cmd/dossier/main.go
    binary: dossier
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  -
    id: dossier-archive
    ids: [dossier]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - README.es.md
      - CHANGELOG.md
    wrap_in_directory: false

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: danshort
    name: dossier
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  mode: replace

brews:
  -
    name: dossier
    homepage: https://github.com/danshort/dossier
    description: "Keyboard-driven TUI for navigating OpenSpec project artifacts"
    license: MIT
    repository:
      owner: danshort
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    install: |
      bin.install "dossier"
    test: |
      system "#{bin}/dossier", "--version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
