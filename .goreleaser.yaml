project_name: lectern
version: 2

before:
  hooks:
    - go mod tidy
    - go test -v ./...

builds:
  -
    id: lectern
    main: ./cmd/lectern/main.go
    binary: lectern
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  -
    id: lectern-archive
    ids: [lectern]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
    wrap_in_directory: false

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: danshort
    name: lectern
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  # release-please creates the GitHub release (with changelog notes) before
  # GoReleaser runs; append uploads the binaries + checksums onto it without
  # clobbering those notes.
  mode: append

brews:
  -
    name: lectern
    homepage: https://github.com/danshort/lectern
    description: "Keyboard-driven TUI for navigating OpenSpec project artifacts"
    license: MIT
    repository:
      owner: danshort
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    install: |
      bin.install "lectern"
    test: |
      system "#{bin}/lectern", "--version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
