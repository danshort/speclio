name: Release

# release-please watches merges to main and maintains a "release PR" that bumps
# the version and updates CHANGELOG.md from Conventional Commit messages. Merging
# that PR creates the tag + GitHub release; the goreleaser job then builds the
# binaries and updates the Homebrew tap.
#
# Both run in one workflow on purpose: a tag/release created by the default
# GITHUB_TOKEN does NOT trigger a separate workflow, so gating goreleaser on
# release-please's output (same run) is what makes the binaries get built.
#
# The macos-app job builds + publishes the native app and its Homebrew cask at
# the same version, as a SIBLING of goreleaser (no mutual dependency) so a macOS
# build/notarization failure can never block the CLI formula release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Sibling of goreleaser (no mutual dependency): builds + publishes the macOS
  # app and its cask at the same version. Its failure can't block the CLI
  # release. Notarization (#67) slots into the reusable workflow later.
  macos-app:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/macos-app-release.yml
    with:
      version: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
