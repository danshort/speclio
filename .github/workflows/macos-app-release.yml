name: macOS app release

# Decoupled from the CLI release (release.yml runs on push to main via
# release-please). This runs only on a macos-app-v* tag (or manual dispatch),
# so a macOS build/notarization outage can never block a `brew install lectern`
# CLI release.
on:
  push:
    tags: ['macos-app-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#macos-app-v}" >> "$GITHUB_OUTPUT"
          fi

      # Ad-hoc by default; Developer-ID when the MACOS_SIGN_IDENTITY secret is
      # set (empty/unset → package.sh falls back to ad-hoc). Notarization is
      # added once the Apple Developer account is approved — see issue #67.
      - name: Package app
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: macos/LecternApp/scripts/package.sh "${{ steps.ver.outputs.version }}"

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          gh release create "macos-app-v$V" \
            "macos/LecternApp/dist/Lectern-$V.zip" \
            --title "Lectern (macOS) v$V" \
            --notes "Preview build of the native macOS reader (OpenSpec viewer).

          Ad-hoc signed, not yet notarized — on first launch right-click Lectern.app → Open (or \`xattr -dr com.apple.quarantine\`). Notarized builds will follow (see #67)."
